description: >-
  The Delta Regional Authority (DRA) is a federal-state partnership
  established in 2000 to promote and encourage economic development of
  the lower Mississippi River and Alabama Black Belt regions. DRA does
  not publish a public REST API; this profile indexes the public website,
  grants information, and program resources.
